<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KAZE SCRIPT KEY SYSTEM</title>

<style>
body{
    background:#0b0f16;
    color:white;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    text-align:center;
    margin-top:80px;
}
h2{
    font-size:42px;
    letter-spacing:2px;
    margin-bottom:20px;
    text-shadow:0 0 15px rgba(255,255,255,0.1);
}
#key{
    font-size:36px;
    font-weight:bold;
    margin-top:50px;
    padding:30px 40px;
    border-radius:20px;
    border:4px solid #ff0033;
    display:inline-block;
    min-width:350px;
    background:#0f1624;
    box-shadow:0 0 30px rgba(255,0,0,0.4);
}
#timer{
    margin-top:25px;
    font-size:24px;
    color:#ff4444;
    font-weight:bold;
    text-transform:uppercase;
}
button{
    margin-top:60px;
    padding:35px 120px;
    font-size:32px;
    font-weight:900;
    border:none;
    border-radius:25px;
    cursor:pointer;
    color:white;
    position:relative;
    background:#111;
    overflow:hidden;
    transition:transform .2s,box-shadow .2s;
    display:inline-flex;
    align-items:center;
    justify-content:center;
}
button::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:conic-gradient(transparent,transparent,transparent,#ff0000);
    animation:rotate 1.5s linear infinite;
    z-index:0;
}
button::after{
    content:"";
    position:absolute;
    inset:4px;
    background:#111;
    border-radius:21px;
    z-index:0;
}
button span{
    position:relative;
    z-index:1;
    text-shadow:0 0 10px rgba(255,0,0,.8);
}
@keyframes rotate{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}
button:hover{
    transform:scale(1.1);
    box-shadow:0 0 40px rgba(255,0,0,.6);
}
button:active{
    transform:scale(.95);
}
#info{
    margin-top:50px;
    font-size:18px;
    color:#888;
    line-height:1.6;
    max-width:600px;
    margin-left:auto;
    margin-right:auto;
}
</style>
</head>

<body>

<h2>KAZEHAYAMODZ FREE KEY CODM SCRIPT</h2>

<div id="key">Generating key...</div>
<div id="timer"></div>

<br>

<button onclick="copyKey()">
<span>📜 COPY SCRIPT KEY</span>
</button>

<div id="info">
Free key | Device locked | Auto redirect after 20 seconds
</div>

<script>
/* ======================
PARAM CHECK
====================== */
let params = new URLSearchParams(window.location.search);
let pass = params.get("pass");
if(pass !== "1"){
    location.replace("https://kazehayamodz-main-page.onrender.com");
}

/* ======================
REFRESH BLOCK
====================== */
if(performance.navigation.type === 1){
    location.replace("https://kazehayamodz-main-page.onrender.com");
}

/* ======================
KEY SYSTEM
====================== */
async function loadKey(){
    const keyDiv = document.getElementById("key");
    keyDiv.style.color = "white";
    keyDiv.innerText="Generating key...";
    try{
        // Kumuha ng token
        let tokenRes = await fetch("https://codm-script.onrender.com/token",{cache:"no-store"});
        let tokenData = await tokenRes.json();
        if(!tokenData.token){
            keyDiv.style.color = "red";
            keyDiv.innerText="Server busy";
            return;
        }
        let token = tokenData.token;

        // Kumuha ng key gamit ang token
        let keyRes = await fetch(`https://codm-script.onrender.com/getkey?token=${token}`,{cache:"no-store"});
        let data = await keyRes.json();

        if(data.status !== "success"){
            keyDiv.style.color = "red";
            keyDiv.innerText = data.message || "Invalid or expired token";
            return;
        }

        let key = data.key;
        keyDiv.style.color = "white";
        keyDiv.innerText = key;

        // Auto-copy
        navigator.clipboard.writeText(key).catch(()=>{});

        // Timer redirect
        startRedirectTimer();

    } catch(e){
        keyDiv.style.color = "red";
        keyDiv.innerText="Server error. Please try again.";
    }
}

/* ======================
REDIRECT TIMER
====================== */
function startRedirectTimer(){
    let seconds = 20;
    const timer = document.getElementById("timer");
    timer.innerText=`Returning to main page in ${seconds}s...`;

    const interval = setInterval(()=>{
        seconds--;
        timer.innerText=`Returning to main page in ${seconds}s...`;
        if(seconds <= 0){
            clearInterval(interval);
            location.replace("https://kazehayamodz-main-page.onrender.com");
        }
    },1000);
}

/* ======================
COPY BUTTON
====================== */
function copyKey(){
    let key=document.getElementById("key").innerText;
    navigator.clipboard.writeText(key);
    location.replace("https://kazehayamodz-main-page.onrender.com");
}

/* ======================
BACK BUTTON BLOCK
====================== */
history.pushState(null,null,location.href);
window.onpopstate=function(){
    location.replace("https://kazehayamodz-main-page.onrender.com");
};

window.onload=loadKey;
</script>

</body>
</html>
